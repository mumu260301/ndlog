<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="ndlog-version" content="v1.9">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ndlog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ebe3;min-height:100vh}
:root{
  --warm-bg:#faf7f2;--warm-card:#fff9f4;--warm-border:#e8ddd0;
  --warm-accent:#c4956a;--warm-accent2:#a67c52;--warm-muted:#8c7560;
  --warm-light:#f5ede0;--warm-text:#4a3728;--warm-text2:#7a6050;
  --warm-red:#c46a6a;--warm-yellow:#d4a852;
}
.app{display:flex;min-height:100vh;background:var(--warm-bg)}
.sidebar{width:52px;background:var(--warm-light);border-right:1px solid var(--warm-border);display:flex;flex-direction:column;align-items:center;padding:8px 4px 8px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow:hidden}
.sidebar-title{writing-mode:vertical-rl;font-size:10px;color:var(--warm-muted);margin-bottom:6px;letter-spacing:1px;flex-shrink:0}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;scrollbar-width:none}
.sidebar-scroll::-webkit-scrollbar{display:none}
.day-btn{width:36px;min-height:36px;border-radius:8px;border:1px solid var(--warm-border);background:var(--warm-card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:var(--warm-text2);line-height:1.2;transition:all .15s;padding:3px 2px}
.day-btn:hover,.day-btn.active{background:var(--warm-accent);color:#fff;border-color:var(--warm-accent)}
.day-btn.has-data{border-color:var(--warm-accent);color:var(--warm-accent2)}
.day-btn.has-data.active{color:#fff}
.main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:600px;margin:0 auto;width:100%}
.header{text-align:center;padding:8px 0 4px}
.header h1{font-size:17px;font-weight:500;color:var(--warm-text);line-height:1.4}
.header .maker{font-size:11px;color:var(--warm-muted);margin-top:4px;letter-spacing:.5px}
.date-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px;flex-wrap:wrap}
.date-row input{border:1px solid var(--warm-border);border-radius:8px;padding:5px 10px;font-size:13px;background:var(--warm-card);color:var(--warm-text)}
.child-bar{background:var(--warm-card);border:1px solid var(--warm-border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.child-bar-label{font-size:12px;color:var(--warm-muted);flex-shrink:0}
.child-tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.child-tab{padding:5px 12px;border-radius:20px;border:1px solid var(--warm-border);background:var(--warm-light);font-size:12px;color:var(--warm-text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.child-tab:hover{border-color:var(--warm-accent)}
.child-tab.active{background:var(--warm-accent);color:#fff;border-color:var(--warm-accent)}
.child-tab .edit-btn{font-size:11px;opacity:.65;cursor:pointer;border:none;background:none;padding:0;color:inherit;line-height:1}
.child-tab .edit-btn:hover{opacity:1}
.add-child-btn{padding:5px 12px;border-radius:20px;border:1px dashed var(--warm-border);background:none;font-size:12px;color:var(--warm-muted);cursor:pointer;flex-shrink:0}
.add-child-btn:hover{border-color:var(--warm-accent);color:var(--warm-accent)}
.section{background:var(--warm-card);border:1px solid var(--warm-border);border-radius:12px;padding:14px}
.section-title{font-size:14px;font-weight:500;color:var(--warm-accent2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title span{font-size:11px;color:var(--warm-muted);font-weight:400}
.field-label{font-size:12px;color:var(--warm-text2);margin-bottom:6px;margin-top:10px}
.field-label:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.chip-wrap{display:inline-flex;align-items:center;border-radius:20px;border:1px solid var(--warm-border);background:var(--warm-light);overflow:hidden;transition:border-color .15s}
.chip-wrap:hover{border-color:var(--warm-accent)}
.chip-wrap.selected{background:var(--warm-accent);border-color:var(--warm-accent)}
.chip-wrap.selected .chip-label{color:#fff}
.chip-wrap.selected .chip-del{color:rgba(255,255,255,.7)}
.chip-wrap.selected .chip-del:hover{color:#fff}
.chip-label{padding:5px 8px 5px 12px;font-size:12px;color:var(--warm-text2);cursor:pointer;user-select:none}
.chip-del{padding:5px 8px 5px 2px;font-size:11px;color:var(--warm-muted);cursor:pointer;background:none;border:none;font-family:inherit}
.chip-del:hover{color:var(--warm-red)}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--warm-border);background:var(--warm-light);font-size:12px;color:var(--warm-text2);cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--warm-accent)}
.chip.selected{background:var(--warm-accent);color:#fff;border-color:var(--warm-accent)}
.add-chip-row{display:flex;gap:6px;margin-top:6px}
.add-chip-row input{flex:1;border:1px solid var(--warm-border);border-radius:20px;padding:5px 12px;font-size:12px;background:var(--warm-light);color:var(--warm-text)}
.add-chip-row input:focus{outline:none;border-color:var(--warm-accent)}
.add-chip-row button{border:1px solid var(--warm-border);border-radius:20px;padding:5px 14px;font-size:12px;background:var(--warm-card);color:var(--warm-accent2);cursor:pointer;white-space:nowrap}
.add-chip-row button:hover{background:var(--warm-accent);color:#fff;border-color:var(--warm-accent)}
.text-input{width:100%;border:1px solid var(--warm-border);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--warm-light);color:var(--warm-text);resize:vertical;min-height:40px;font-family:inherit}
.text-input:focus{outline:none;border-color:var(--warm-accent)}
.stars{display:flex;gap:6px;margin:6px 0}
.star{font-size:24px;cursor:pointer;color:#ddd;transition:color .1s}
.star.lit{color:var(--warm-yellow)}
.hidden-block{display:none;flex-direction:column;gap:8px;margin-top:8px;padding:10px;background:var(--warm-light);border-radius:10px;border:1px solid var(--warm-border)}
.hidden-block.show{display:flex}
.repeatable-item{border:1px solid var(--warm-border);border-radius:10px;padding:12px;position:relative;margin-bottom:8px;background:var(--warm-light)}
.remove-btn{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--warm-muted);cursor:pointer;font-size:16px;line-height:1}
.remove-btn:hover{color:var(--warm-red)}
.add-block-btn{width:100%;padding:8px;border:1px dashed var(--warm-border);border-radius:8px;background:none;color:var(--warm-muted);font-size:13px;cursor:pointer;margin-top:6px}
.add-block-btn:hover{border-color:var(--warm-accent);color:var(--warm-accent)}
.collapsible-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.collapsible-body{margin-top:10px}
.collapsible-body.collapsed{display:none}
.action-row{display:flex;gap:10px;margin-top:4px}
.btn-save{flex:1;padding:10px;border:none;border-radius:10px;background:var(--warm-accent);color:#fff;font-size:14px;cursor:pointer;font-weight:500}
.btn-save:hover{background:var(--warm-accent2)}
.btn-stats{flex:1;padding:10px;border:1px solid var(--warm-border);border-radius:10px;background:var(--warm-card);color:var(--warm-text2);font-size:14px;cursor:pointer}
.btn-stats:hover{background:var(--warm-light);border-color:var(--warm-accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--warm-accent);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--warm-card);border-radius:16px;width:100%;max-width:480px;padding:20px;margin:auto}
.modal h2{font-size:16px;font-weight:500;color:var(--warm-text);margin-bottom:14px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--warm-muted);line-height:1}
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.export-row input[type=date]{border:1px solid var(--warm-border);border-radius:8px;padding:5px 10px;font-size:12px;background:var(--warm-light);color:var(--warm-text)}
.export-row button{padding:6px 14px;border-radius:8px;border:none;background:var(--warm-accent);color:#fff;font-size:12px;cursor:pointer}
.stat-card{background:var(--warm-light);border-radius:10px;padding:12px;margin-bottom:10px}
.stat-card h3{font-size:12px;color:var(--warm-muted);margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:12px;color:var(--warm-text2);min-width:64px}
.bar-track{flex:1;height:10px;background:var(--warm-border);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;background:var(--warm-accent);border-radius:5px;transition:width .4s}
.bar-count{font-size:11px;color:var(--warm-muted);min-width:20px;text-align:right}
.stat-table{width:100%;border-collapse:collapse;font-size:11px}
.stat-table th{text-align:left;color:var(--warm-muted);padding:4px 5px;border-bottom:1px solid var(--warm-border)}
.stat-table td{padding:4px 5px;color:var(--warm-text2);border-bottom:1px solid var(--warm-border)}
.duration-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.duration-row input{width:80px;border:1px solid var(--warm-border);border-radius:8px;padding:5px 10px;font-size:13px;background:var(--warm-light);color:var(--warm-text)}
.duration-row span{font-size:13px;color:var(--warm-muted)}
.divider{border:none;border-top:1px dashed var(--warm-border);margin:4px 0}
.footer-note{text-align:center;font-size:11px;color:var(--warm-muted);padding-bottom:24px}
.light-row{display:flex;gap:10px;margin:6px 0;align-items:center;flex-wrap:wrap}
.light-btn{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;opacity:.35;font-size:18px;display:flex;align-items:center;justify-content:center}
.light-btn:hover{opacity:.7;transform:scale(1.08)}
.light-btn.active{opacity:1;border-color:#fff;box-shadow:0 0 0 2px var(--warm-accent2)}
.light-red{background:#e05555}
.light-yellow{background:#e0b030}
.light-green{background:#4aaa66}
.light-label{font-size:11px;color:var(--warm-muted);margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"><div class="sidebar-title">日誌</div><div class="sidebar-scroll" id="sidebar-scroll"></div></div>
  <div class="main">

    <div class="header">
      <h1>神經多樣性｜兒童觀察日誌</h1>
      <div class="maker">— 木木的陪伴室 製作 —</div>
      <div class="date-row">
        <input type="date" id="rec-date" onchange="onDateChange()">
        <input type="time" id="rec-time">
      </div>
    </div>

    <div class="child-bar">
      <div class="child-bar-label">孩子：</div>
      <div class="child-tabs" id="child-tabs"></div>
      <button class="add-child-btn" onclick="addChild()">＋ 新增孩子</button>
    </div>

    <div class="section">
      <div class="section-title">保健食品 / 藥物</div>
      <div class="field-label">今日有無補充（可多選）</div>
      <div class="chips" id="chips-med"></div>
      <div class="add-chip-row">
        <input type="text" placeholder="新增補充品..." id="add-med-input">
        <button onclick="addGlobalOpt('med','add-med-input',refreshMed)">新增</button>
      </div>
      <div class="field-label">今日使用藥物（可多選）</div>
      <div class="chips" id="chips-drug"></div>
      <div class="add-chip-row">
        <input type="text" placeholder="新增藥物名稱..." id="add-drug-input">
        <button onclick="addGlobalOpt('drug','add-drug-input',refreshDrug)">新增</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">今日紀錄</div>
      <div class="field-label">今天</div>
      <div class="chips" id="chips-school-day"></div>

      <div id="holiday-block" style="display:none">
        <div class="field-label">今天的心情</div>
        <div class="chips" id="chips-mood-holiday"></div>
        <div class="add-chip-row">
          <input type="text" placeholder="新增心情..." id="add-mood-h-input">
          <button onclick="addGlobalOpt('mood','add-mood-h-input',refreshMood)">新增</button>
        </div>
      </div>

      <div id="school-block">
        <div class="field-label">放學時的心情</div>
        <div class="chips" id="chips-mood"></div>
        <div class="add-chip-row">
          <input type="text" placeholder="新增心情..." id="add-mood-input">
          <button onclick="addGlobalOpt('mood','add-mood-input',refreshMood)">新增</button>
        </div>
        <div class="field-label">有沒有忘記帶東西</div>
        <div class="chips" id="chips-forgot"></div>
        <div id="forgot-input-area" style="display:none;margin-top:8px">
          <input class="text-input" type="text" id="forgot-what" placeholder="忘記帶了什麼？">
        </div>
        <div class="field-label">今天是否收到老師的反應</div>
        <div class="chips" id="chips-teacher"></div>
        <div class="hidden-block" id="teacher-block">
        <div class="field-label">狀態</div>
        <div class="light-row">
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <div class="light-btn light-red" id="light-red" onclick="selectLight('red')" title="紅燈｜事件嚴重">🔴</div>
            <div class="light-label">嚴重</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <div class="light-btn light-yellow" id="light-yellow" onclick="selectLight('yellow')" title="黃燈｜有事件">🟡</div>
            <div class="light-label">有事件</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <div class="light-btn light-green" id="light-green" onclick="selectLight('green')" title="綠燈｜好事">🟢</div>
            <div class="light-label">好事</div>
          </div>
        </div>
        <div class="field-label">事件分類（可多選）</div>
        <div class="chips" id="chips-teacher-cat"></div>
        <div class="add-chip-row">
          <input type="text" placeholder="新增分類..." id="add-tcat-input">
          <button onclick="addGlobalOpt('event_category','add-tcat-input',refreshTeacherCat)">新增</button>
        </div>
        <div class="field-label">事件發生時間</div>
        <input class="text-input" type="text" id="t-time" placeholder="例如：下午2點">
        <div class="field-label">事件發生地點</div>
        <input class="text-input" type="text" id="t-place" placeholder="例如：教室">
        <div class="field-label">對象是</div>
        <input class="text-input" type="text" id="t-target" placeholder="例如：同學、老師">
        <div class="field-label">發生的事情（老師的說法）</div>
        <textarea class="text-input" id="t-teacher-say" rows="2" placeholder="老師的說法..."></textarea>
        <div class="field-label">孩子的說法</div>
        <textarea class="text-input" id="t-child-say" rows="2" placeholder="孩子的說法..."></textarea>
        <div class="field-label">家長處理方式</div>
        <textarea class="text-input" id="t-parent-handle" rows="2" placeholder="家長的處理方式..."></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="collapsible-header" onclick="toggleCollapse('hw-body','hw-icon')">
        <div class="section-title" style="margin:0">寫作業狀況 <span>（可新增多筆）</span></div>
        <span id="hw-icon" style="font-size:12px;color:var(--warm-muted)">▼</span>
      </div>
      <div class="collapsible-body collapsed" id="hw-body">
        <div id="hw-list" style="margin-top:10px"></div>
        <button class="add-block-btn" onclick="addHW()">＋ 新增作業紀錄</button>
      </div>
    </div>

    <div class="section">
      <div class="collapsible-header" onclick="toggleCollapse('special-body','special-icon')">
        <div class="section-title" style="margin:0">特別狀況 <span>（選填）</span></div>
        <span id="special-icon" style="font-size:12px;color:var(--warm-muted)">▼</span>
      </div>
      <div class="collapsible-body collapsed" id="special-body">
        <div id="special-list" style="margin-top:10px"></div>
        <button class="add-block-btn" onclick="addSpecial()">＋ 新增特別狀況</button>
      </div>
    </div>

    <hr class="divider">

    <div class="section">
      <div class="section-title">小練習 <span>（可新增多筆）</span></div>
      <div id="practice-list"></div>
      <button class="add-block-btn" onclick="addPractice()">＋ 新增練習紀錄</button>
    </div>

    <div class="section" style="background:#fdf8ee;border-color:#f0d48a">
      <div class="section-title" style="color:#9a6e1a">今日亮點 ✦ <span style="color:#b8860b;font-weight:400;font-size:11px">（必填）</span></div>
      <textarea class="text-input" id="highlight" rows="3" placeholder="哪怕很小，也值得被記下來" style="background:#fef4d6;border-color:#f0d48a;color:#7a5a10"></textarea>
    </div>

    <hr class="divider">

    <div class="section">
      <div class="section-title">今後策略 <span>（選填）</span></div>
      <textarea class="text-input" id="strategy" rows="2" placeholder="家長可以調整的事..."></textarea>
    </div>

    <div class="action-row">
      <button class="btn-save" onclick="saveRecord()">儲存今日日誌</button>
      <button class="btn-stats" onclick="showStats()">📊 統計</button>
    </div>
    <p class="footer-note">資料儲存於您的瀏覽器本機端，請定期匯出CSV備份<br><span style="font-size:10px;opacity:.6">v1.9</span></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="stats-panel">
  <div class="modal">
    <button class="modal-close" onclick="hideStats()">✕</button>
    <div style="display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--warm-border)">
      <button id="tab-btn-stats" onclick="switchStatsTab('stats')" style="flex:1;padding:8px;border:none;background:none;font-size:13px;color:var(--warm-accent2);font-weight:500;border-bottom:2px solid var(--warm-accent);cursor:pointer">📊 統計</button>
      <button id="tab-btn-export" onclick="switchStatsTab('export')" style="flex:1;padding:8px;border:none;background:none;font-size:13px;color:var(--warm-muted);border-bottom:2px solid transparent;cursor:pointer">📋 紀錄 / 匯出</button>
    </div>
    <div id="tab-stats">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--warm-muted)">日期範圍：</span>
        <input type="date" id="exp-from" onchange="onStatsDateChange()" style="border:1px solid var(--warm-border);border-radius:8px;padding:4px 8px;font-size:12px;background:var(--warm-light);color:var(--warm-text)">
        <span style="font-size:12px;color:var(--warm-muted)">～</span>
        <input type="date" id="exp-to" onchange="onStatsDateChange()" style="border:1px solid var(--warm-border);border-radius:8px;padding:4px 8px;font-size:12px;background:var(--warm-light);color:var(--warm-text)">
      </div>
      <div id="stats-content"></div>
    </div>
    <div id="tab-export" style="display:none">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--warm-muted)">匯出範圍：</span>
        <input type="date" id="exp-from2" onchange="onExportDateChange()" style="border:1px solid var(--warm-border);border-radius:8px;padding:4px 8px;font-size:12px;background:var(--warm-light);color:var(--warm-text)">
        <span style="font-size:12px;color:var(--warm-muted)">～</span>
        <input type="date" id="exp-to2" onchange="onExportDateChange()" style="border:1px solid var(--warm-border);border-radius:8px;padding:4px 8px;font-size:12px;background:var(--warm-light);color:var(--warm-text)">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button onclick="exportCSV()" style="padding:7px 16px;border-radius:8px;border:none;background:var(--warm-accent);color:#fff;font-size:12px;cursor:pointer">匯出 CSV</button>
        <button onclick="exportJSON()" style="padding:7px 16px;border-radius:8px;border:1px solid var(--warm-border);background:var(--warm-card);color:var(--warm-accent2);font-size:12px;cursor:pointer">備份 JSON</button>
        <label style="padding:7px 16px;border-radius:8px;border:1px solid var(--warm-border);background:var(--warm-card);color:var(--warm-accent2);font-size:12px;cursor:pointer">還原 JSON<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
      </div>
      <div id="export-records"></div>
    </div>
  </div>
</div>

<script>
const STORE_KEY='ndj_records_v1';
const CHILDREN_KEY='ndj_children_v1';
const GOPTS_KEY='ndj_gopts_v1';

let gOpts=JSON.parse(localStorage.getItem(GOPTS_KEY)||'{}');
function saveGOpts(){localStorage.setItem(GOPTS_KEY,JSON.stringify(gOpts))}

const defaultOpts={
  med:['魚油','GABA','鋅錠','綜合維他命'],
  drug:[],
  mood:['愉快','普通','不佳'],
  hw_item:['甲乙本','語詞半行','抄寫短文','國作'],
  hw_emotion:['愉快','平穩','煩躁','抗拒','爆炸','動來動去','離開座位'],
  practice_item:['減敏訓練','小肌肉訓練','專注力訓練','情緒調節練習'],
  event_category:['言語衝突','肢體衝突','觸摸別人','態度不佳','有進步','誠實'],
};
function getDef(k){return defaultOpts[k]||[]}
function getCust(k){return gOpts[k]||[]}
function getAllOpts(k){return[...getDef(k),...getCust(k)]}

function addGlobalOpt(key,inputId,refreshFn){
  const inp=document.getElementById(inputId);const val=inp.value.trim();if(!val)return;
  if(!gOpts[key])gOpts[key]=[];
  if(!getAllOpts(key).includes(val)){gOpts[key].push(val);saveGOpts();}
  inp.value='';refreshFn();
}
function removeGlobalOpt(key,val,refreshFn){
  if(!gOpts[key])return;
  gOpts[key]=gOpts[key].filter(v=>v!==val);saveGOpts();
  if(key==='med')state.med=state.med.filter(v=>v!==val);
  if(key==='drug')state.drug=state.drug.filter(v=>v!==val);
  if(key==='mood'&&state.mood===val)state.mood='';
  refreshFn();
}
function removeHWOpt(key,val){
  if(!gOpts[key])return;
  gOpts[key]=gOpts[key].filter(v=>v!==val);saveGOpts();
  state.hw.forEach(hw=>{
    if(key==='hw_item'&&hw.items===val)hw.items='';
    if(key==='hw_emotion')hw.emotions=hw.emotions.filter(e=>e!==val);
  });renderHW();
}
function removeEventCatOpt(val){
  if(!gOpts['event_category'])return;
  gOpts['event_category']=gOpts['event_category'].filter(v=>v!==val);saveGOpts();
  state.special.forEach(s=>{if(s.categories)s.categories=s.categories.filter(c=>c!==val);});
  if(state.teacherData.categories)state.teacherData.categories=state.teacherData.categories.filter(c=>c!==val);
  renderSpecial();
}
function removePracticeOpt(val){
  if(!gOpts['practice_item'])return;
  gOpts['practice_item']=gOpts['practice_item'].filter(v=>v!==val);saveGOpts();
  state.practice.forEach(p=>{if(p.item===val)p.item='';});renderPractice();
}

// Children
let children=JSON.parse(localStorage.getItem(CHILDREN_KEY)||'null');
if(!children){children=[{id:'child_1',name:'孩子1'}];localStorage.setItem(CHILDREN_KEY,JSON.stringify(children));}
let currentChildId=children[0].id;
function saveChildren(){localStorage.setItem(CHILDREN_KEY,JSON.stringify(children))}

function addChild(){
  const name=prompt('請輸入孩子的名字：','孩子'+(children.length+1));
  if(!name||!name.trim())return;
  const id='child_'+Date.now();
  children.push({id,name:name.trim()});saveChildren();
  currentChildId=id;renderChildTabs();resetState();renderAll();
}
function renameChild(id){
  const child=children.find(c=>c.id===id);if(!child)return;
  const name=prompt('更改孩子的名字：',child.name);
  if(!name||!name.trim())return;
  child.name=name.trim();saveChildren();renderChildTabs();
}
function renderChildTabs(){
  const ct=document.getElementById('child-tabs');ct.innerHTML='';
  children.forEach(child=>{
    const tab=document.createElement('div');
    tab.className='child-tab'+(child.id===currentChildId?' active':'');
    const nameSpan=document.createElement('span');nameSpan.textContent=child.name;
    nameSpan.onclick=()=>{currentChildId=child.id;switchChild();};
    const editBtn=document.createElement('button');editBtn.className='edit-btn';editBtn.textContent='✎';editBtn.title='更改名字';
    editBtn.onclick=e=>{e.stopPropagation();renameChild(child.id);};
    tab.appendChild(nameSpan);tab.appendChild(editBtn);ct.appendChild(tab);
  });
}
function switchChild(){
  renderChildTabs();resetState();
  const today=document.getElementById('rec-date').value;
  const r=getChildRecords(currentChildId);
  if(r[today])loadRecord(today);else{renderAll();addHW();}
}

// Records
function getAllRecords(){return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}
function saveAllRecords(all){localStorage.setItem(STORE_KEY,JSON.stringify(all))}
function getChildRecords(childId){const all=getAllRecords();return all[childId]||{}}
function setChildRecord(childId,date,record){
  const all=getAllRecords();if(!all[childId])all[childId]={};
  all[childId][date]=record;saveAllRecords(all);
}

// State
let state={};
function resetState(){
  state={med:[],drug:[],mood:'',schoolDay:'',forgotYes:false,forgotWhat:'',
    teacherYes:false,teacherData:{},hw:[],special:[],practice:[],
    highlight:'',strategy:'',recDate:'',recTime:''};
}
resetState();

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function toggleCollapse(bId,iId){const b=document.getElementById(bId),i=document.getElementById(iId);b.classList.toggle('collapsed');i.textContent=b.classList.contains('collapsed')?'▼':'▲'}

function makeChip(label,selected,onClick){
  const d=document.createElement('div');d.className='chip'+(selected?' selected':'');d.textContent=label;d.onclick=onClick;return d;
}
function makeCustomChip(label,selected,onClick,onDel){
  const w=document.createElement('div');w.className='chip-wrap'+(selected?' selected':'');
  const lbl=document.createElement('span');lbl.className='chip-label';lbl.textContent=label;lbl.onclick=onClick;
  const del=document.createElement('button');del.className='chip-del';del.textContent='✕';del.title='移除此選項';
  del.onclick=e=>{e.stopPropagation();onDel();};
  w.appendChild(lbl);w.appendChild(del);return w;
}

function refreshMed(){
  const c=document.getElementById('chips-med');c.innerHTML='';
  getDef('med').forEach(opt=>c.appendChild(makeChip(opt,state.med.includes(opt),()=>{const i=state.med.indexOf(opt);if(i>-1)state.med.splice(i,1);else state.med.push(opt);refreshMed();})));
  getCust('med').forEach(opt=>c.appendChild(makeCustomChip(opt,state.med.includes(opt),()=>{const i=state.med.indexOf(opt);if(i>-1)state.med.splice(i,1);else state.med.push(opt);refreshMed();},()=>removeGlobalOpt('med',opt,refreshMed))));
}
function refreshDrug(){
  const c=document.getElementById('chips-drug');c.innerHTML='';
  getDef('drug').forEach(opt=>c.appendChild(makeChip(opt,state.drug.includes(opt),()=>{const i=state.drug.indexOf(opt);if(i>-1)state.drug.splice(i,1);else state.drug.push(opt);refreshDrug();})));
  getCust('drug').forEach(opt=>c.appendChild(makeCustomChip(opt,state.drug.includes(opt),()=>{const i=state.drug.indexOf(opt);if(i>-1)state.drug.splice(i,1);else state.drug.push(opt);refreshDrug();},()=>removeGlobalOpt('drug',opt,refreshDrug))));
}
function refreshMood(){
  // school mood
  const c=document.getElementById('chips-mood');c.innerHTML='';
  getDef('mood').forEach(opt=>c.appendChild(makeChip(opt,state.mood===opt,()=>{state.mood=opt;refreshMood();})));
  getCust('mood').forEach(opt=>c.appendChild(makeCustomChip(opt,state.mood===opt,()=>{state.mood=opt;refreshMood();},()=>removeGlobalOpt('mood',opt,refreshMood))));
  // holiday mood (same options, same state.mood)
  const ch=document.getElementById('chips-mood-holiday');if(!ch)return;ch.innerHTML='';
  getDef('mood').forEach(opt=>ch.appendChild(makeChip(opt,state.mood===opt,()=>{state.mood=opt;refreshMood();})));
  getCust('mood').forEach(opt=>ch.appendChild(makeCustomChip(opt,state.mood===opt,()=>{state.mood=opt;refreshMood();},()=>removeGlobalOpt('mood',opt,refreshMood))));
}
function updateSchoolHolidayBlocks(){
  const isHoliday=state.schoolDay==='放假';
  const noSelect=!state.schoolDay;
  document.getElementById('holiday-block').style.display=isHoliday?'block':'none';
  document.getElementById('school-block').style.display=(!isHoliday&&!noSelect)?'block':'none';
}
function selectLight(color){
  if(!state.teacherData)state.teacherData={};
  state.teacherData.light=state.teacherData.light===color?'':color;
  refreshLight();
}
function refreshLight(){
  const light=(state.teacherData&&state.teacherData.light)||'';
  ['red','yellow','green'].forEach(c=>{
    const el=document.getElementById('light-'+c);
    if(el)el.classList.toggle('active',light===c);
  });
}
// refreshTeacherLight merged into selectLight
function refreshTeacherCat(){
  const c=document.getElementById('chips-teacher-cat');if(!c)return;c.innerHTML='';
  const cats=(state.teacherData&&state.teacherData.categories)||[];
  getDef('event_category').forEach(opt=>c.appendChild(makeChip(opt,cats.includes(opt),()=>{
    if(!state.teacherData.categories)state.teacherData.categories=[];
    const idx=state.teacherData.categories.indexOf(opt);
    if(idx>-1)state.teacherData.categories.splice(idx,1);else state.teacherData.categories.push(opt);
    refreshTeacherCat();
  })));
  getCust('event_category').forEach(opt=>c.appendChild(makeCustomChip(opt,cats.includes(opt),()=>{
    if(!state.teacherData.categories)state.teacherData.categories=[];
    const idx=state.teacherData.categories.indexOf(opt);
    if(idx>-1)state.teacherData.categories.splice(idx,1);else state.teacherData.categories.push(opt);
    refreshTeacherCat();
  },()=>removeEventCatOpt(opt))));
}
function initStaticChips(){
  const sdc=document.getElementById('chips-school-day');sdc.innerHTML='';
  ['整天','半天','放假'].forEach(opt=>sdc.appendChild(makeChip(opt,state.schoolDay===opt,()=>{state.schoolDay=opt;updateSchoolHolidayBlocks();initStaticChips();})));
  updateSchoolHolidayBlocks();
  const fc=document.getElementById('chips-forgot');fc.innerHTML='';
  ['沒有','有，忘記帶了'].forEach(opt=>{
    const yes=opt==='有，忘記帶了';
    fc.appendChild(makeChip(opt,state.forgotYes===yes,()=>{state.forgotYes=yes;document.getElementById('forgot-input-area').style.display=yes?'block':'none';initStaticChips();}));
  });
  const tc=document.getElementById('chips-teacher');tc.innerHTML='';
  ['沒有','有'].forEach(opt=>{
    const yes=opt==='有';
    tc.appendChild(makeChip(opt,state.teacherYes===yes,()=>{state.teacherYes=yes;document.getElementById('teacher-block').classList.toggle('show',yes);initStaticChips();}));
  });
}

function addHW(){state.hw.push({items:'',doneMin:'',focus:0,reminders:'',emotions:[]});renderHW();}
function removeHW(i){state.hw.splice(i,1);renderHW();autoSave();}
function renderHW(){
  const list=document.getElementById('hw-list');list.innerHTML='';
  state.hw.forEach((hw,i)=>{
    const div=document.createElement('div');div.className='repeatable-item';
    div.innerHTML=`<button class="remove-btn" onclick="removeHW(${i})">✕</button>
      <div class="field-label">作業項目（單選）</div><div class="chips" id="hwi-${i}"></div>
      <div class="add-chip-row"><input type="text" placeholder="新增作業項目..." id="ahwi-${i}"><button onclick="addHWItemCust(${i})">新增</button></div>
      <div class="field-label">作業花費時間</div>
      <div class="duration-row"><input type="number" min="0" value="${hw.doneMin||''}" placeholder="0" oninput="state.hw[${i}].doneMin=this.value"><span>分鐘</span></div>
      <div class="field-label">專注度</div><div class="stars" id="stars-${i}"></div>
      <div class="field-label">提醒次數</div>
      <div class="duration-row"><input type="number" value="${hw.reminders||0}" min="0" oninput="state.hw[${i}].reminders=this.value"><span>次</span></div>
      <div class="field-label">情緒和行為（可多選）</div><div class="chips" id="hwe-${i}"></div>
      <div class="add-chip-row"><input type="text" placeholder="新增情緒/行為..." id="ahwe-${i}"><button onclick="addHWEmoCust(${i})">新增</button></div>`;
    list.appendChild(div);
    const ic=document.getElementById(`hwi-${i}`);
    getDef('hw_item').forEach(opt=>ic.appendChild(makeChip(opt,hw.items===opt,(()=>{const o=opt;return()=>{state.hw[i].items=o;renderHW();}})())));
    getCust('hw_item').forEach(opt=>ic.appendChild(makeCustomChip(opt,hw.items===opt,(()=>{const o=opt;return()=>{state.hw[i].items=o;renderHW();}})(), (()=>{const o=opt;return()=>removeHWOpt('hw_item',o);})())));
    const sc=document.getElementById(`stars-${i}`);
    for(let s=1;s<=5;s++){const sp=document.createElement('span');sp.className='star'+(s<=hw.focus?' lit':'');sp.textContent='★';sp.onclick=(()=>{const sv=s;return()=>{state.hw[i].focus=sv;renderHW();}})();sc.appendChild(sp);}
    const ec=document.getElementById(`hwe-${i}`);
    getDef('hw_emotion').forEach(opt=>ec.appendChild(makeChip(opt,hw.emotions.includes(opt),(()=>{const o=opt;return()=>{const idx=state.hw[i].emotions.indexOf(o);if(idx>-1)state.hw[i].emotions.splice(idx,1);else state.hw[i].emotions.push(o);renderHW();}})())));
    getCust('hw_emotion').forEach(opt=>ec.appendChild(makeCustomChip(opt,hw.emotions.includes(opt),(()=>{const o=opt;return()=>{const idx=state.hw[i].emotions.indexOf(o);if(idx>-1)state.hw[i].emotions.splice(idx,1);else state.hw[i].emotions.push(o);renderHW();}})(), (()=>{const o=opt;return()=>removeHWOpt('hw_emotion',o);})())));
  });
}
function addHWItemCust(i){const inp=document.getElementById(`ahwi-${i}`);const val=inp.value.trim();if(!val)return;if(!gOpts['hw_item'])gOpts['hw_item']=[];if(!getAllOpts('hw_item').includes(val)){gOpts['hw_item'].push(val);saveGOpts();}inp.value='';renderHW();}
function addHWEmoCust(i){const inp=document.getElementById(`ahwe-${i}`);const val=inp.value.trim();if(!val)return;if(!gOpts['hw_emotion'])gOpts['hw_emotion']=[];if(!getAllOpts('hw_emotion').includes(val)){gOpts['hw_emotion'].push(val);saveGOpts();}inp.value='';renderHW();}

function addPractice(){state.practice.push({item:'',minutes:'',note:''});renderPractice();}
function removePractice(i){state.practice.splice(i,1);renderPractice();autoSave();}
function renderPractice(){
  const list=document.getElementById('practice-list');list.innerHTML='';
  state.practice.forEach((p,i)=>{
    const div=document.createElement('div');div.className='repeatable-item';
    div.innerHTML=`<button class="remove-btn" onclick="removePractice(${i})">✕</button>
      <div class="field-label">練習項目（單選）</div><div class="chips" id="pitem-${i}"></div>
      <div class="add-chip-row"><input type="text" placeholder="新增練習項目..." id="apitem-${i}"><button onclick="addPracticeItemCust(${i})">新增</button></div>
      <div class="field-label">訓練時間</div>
      <div class="duration-row"><input type="number" min="0" value="${p.minutes||''}" placeholder="0" oninput="state.practice[${i}].minutes=this.value"><span>分鐘</span></div>
      <div class="field-label">補充備註</div>
      <textarea class="text-input" rows="2" placeholder="過程有什麼狀況或問題..." oninput="state.practice[${i}].note=this.value">${p.note||''}</textarea>`;
    list.appendChild(div);
    const ic=document.getElementById(`pitem-${i}`);
    getDef('practice_item').forEach(opt=>ic.appendChild(makeChip(opt,p.item===opt,(()=>{const o=opt;return()=>{state.practice[i].item=o;renderPractice();}})())));
    getCust('practice_item').forEach(opt=>ic.appendChild(makeCustomChip(opt,p.item===opt,(()=>{const o=opt;return()=>{state.practice[i].item=o;renderPractice();}})(), (()=>{const o=opt;return()=>removePracticeOpt(o);})())));
  });
}
function addPracticeItemCust(i){const inp=document.getElementById(`apitem-${i}`);const val=inp.value.trim();if(!val)return;if(!gOpts['practice_item'])gOpts['practice_item']=[];if(!getAllOpts('practice_item').includes(val)){gOpts['practice_item'].push(val);saveGOpts();}inp.value='';renderPractice();}

function addSpecial(){state.special.push({time:'',place:'',target:'',event:'',handle:'',categories:[],light:''});renderSpecial();}
function removeSpecial(i){state.special.splice(i,1);renderSpecial();autoSave();}
function renderSpecial(){
  const list=document.getElementById('special-list');list.innerHTML='';
  state.special.forEach((sp,i)=>{
    if(!sp.categories)sp.categories=[];
    const div=document.createElement('div');div.className='repeatable-item';
    div.innerHTML=`<button class="remove-btn" onclick="removeSpecial(${i})">✕</button>
      <div class="field-label">狀態</div>
      <div class="light-row" id="splight-${i}"></div>
      <div class="field-label">事件分類（可多選）</div>
      <div class="chips" id="spcat-${i}"></div>
      <div class="add-chip-row">
        <input type="text" placeholder="新增分類..." id="add-spcat-${i}">
        <button onclick="addSpecialCatCust(${i})">新增</button>
      </div>
      <div class="field-label">事件發生時間</div><input class="text-input" type="text" value="${sp.time}" placeholder="例如：下午3點" oninput="state.special[${i}].time=this.value">
      <div class="field-label">事件發生地點</div><input class="text-input" type="text" value="${sp.place}" placeholder="地點" oninput="state.special[${i}].place=this.value">
      <div class="field-label">對象是</div><input class="text-input" type="text" value="${sp.target}" placeholder="對象" oninput="state.special[${i}].target=this.value">
      <div class="field-label">發生的事情</div><textarea class="text-input" rows="2" placeholder="事情描述..." oninput="state.special[${i}].event=this.value">${sp.event}</textarea>
      <div class="field-label">處理方式</div><textarea class="text-input" rows="2" placeholder="處理方式..." oninput="state.special[${i}].handle=this.value">${sp.handle}</textarea>`;
    list.appendChild(div);
    // traffic light — same style as teacher block
    const tl=document.getElementById(`splight-${i}`);
    [{val:'red',emoji:'🔴',label:'嚴重',cls:'light-red'},{val:'yellow',emoji:'🟡',label:'有事件',cls:'light-yellow'},{val:'green',emoji:'🟢',label:'好事',cls:'light-green'}].forEach(({val,emoji,label,cls})=>{
      const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px';
      const btn=document.createElement('div');
      btn.className='light-btn '+cls+(sp.light===val?' active':'');
      btn.textContent=emoji;btn.title=label;
      btn.onclick=(()=>{const v=val;return()=>{state.special[i].light=v;renderSpecial();autoSave();};})();
      const lbl=document.createElement('div');lbl.className='light-label';lbl.textContent=label;
      wrap.appendChild(btn);wrap.appendChild(lbl);tl.appendChild(wrap);
    });
    const cc=document.getElementById(`spcat-${i}`);
    getDef('event_category').forEach(opt=>cc.appendChild(makeChip(opt,sp.categories.includes(opt),(()=>{const o=opt;return()=>{const idx=state.special[i].categories.indexOf(o);if(idx>-1)state.special[i].categories.splice(idx,1);else state.special[i].categories.push(o);renderSpecial();};})())))  ;
    getCust('event_category').forEach(opt=>cc.appendChild(makeCustomChip(opt,sp.categories.includes(opt),(()=>{const o=opt;return()=>{const idx=state.special[i].categories.indexOf(o);if(idx>-1)state.special[i].categories.splice(idx,1);else state.special[i].categories.push(o);renderSpecial();};})(),(()=>{const o=opt;return()=>removeEventCatOpt(o);})())));
  });
}
function addSpecialCatCust(i){
  const inp=document.getElementById(`add-spcat-${i}`);const val=inp.value.trim();if(!val)return;
  if(!gOpts['event_category'])gOpts['event_category']=[];
  if(!getAllOpts('event_category').includes(val)){gOpts['event_category'].push(val);saveGOpts();}
  inp.value='';renderSpecial();
}

function gatherState(){
  const isHoliday=state.schoolDay==='放假';
  if(!isHoliday){
    // 只有上學才抓放學相關欄位
    state.forgotWhat=document.getElementById('forgot-what').value;
    const prevCats=(state.teacherData&&state.teacherData.categories)||[];
    const prevLight=(state.teacherData&&state.teacherData.light)||'';
    state.teacherData={time:document.getElementById('t-time').value,place:document.getElementById('t-place').value,target:document.getElementById('t-target').value,teacherSay:document.getElementById('t-teacher-say').value,childSay:document.getElementById('t-child-say').value,parentHandle:document.getElementById('t-parent-handle').value,categories:prevCats,light:prevLight};
  } else {
    // 放假時清空放學相關欄位
    state.forgotYes=false;
    state.forgotWhat='';
    state.teacherYes=false;
    state.teacherData={};
  }
  state.highlight=document.getElementById('highlight').value;
  state.strategy=document.getElementById('strategy').value;
  state.recDate=document.getElementById('rec-date').value;
  state.recTime=document.getElementById('rec-time').value;
}
function autoSave(){
  // silently save current state if recDate exists
  if(!state.recDate)return;
  gatherState();
  setChildRecord(currentChildId,state.recDate,JSON.parse(JSON.stringify(state)));
}
function saveRecord(){
  gatherState();
  if(!state.highlight.trim()){showToast('請填寫今日亮點！');return;}
  setChildRecord(currentChildId,state.recDate,JSON.parse(JSON.stringify(state)));
  showToast('日誌已儲存 ✓');renderSidebar();
}

function renderAll(){
  refreshMed();refreshDrug();refreshMood();initStaticChips();updateSchoolHolidayBlocks();renderHW();renderSpecial();renderPractice();refreshTeacherCat();refreshLight();
  document.getElementById('forgot-what').value=state.forgotWhat||'';
  document.getElementById('forgot-input-area').style.display=state.forgotYes?'block':'none';
  document.getElementById('teacher-block').classList.toggle('show',state.teacherYes);
  const td=state.teacherData||{};
  document.getElementById('t-time').value=td.time||'';document.getElementById('t-place').value=td.place||'';
  document.getElementById('t-target').value=td.target||'';document.getElementById('t-teacher-say').value=td.teacherSay||'';
  document.getElementById('t-child-say').value=td.childSay||'';document.getElementById('t-parent-handle').value=td.parentHandle||'';
  document.getElementById('highlight').value=state.highlight||'';
  document.getElementById('strategy').value=state.strategy||'';
  renderSidebar();
}

function loadRecord(dateKey){
  const r=getChildRecords(currentChildId);if(!r[dateKey])return;
  Object.assign(state,JSON.parse(JSON.stringify(r[dateKey])));
  document.getElementById('rec-date').value=state.recDate;
  document.getElementById('rec-time').value=state.recTime||'';
  renderAll();
}

function renderSidebar(){
  const sb=document.getElementById('sidebar-scroll');sb.innerHTML='';
  const r=getChildRecords(currentChildId);
  const keys=Object.keys(r).sort().reverse();
  if(!keys.length)return;
  // group by year-month
  const groups={};
  keys.forEach(k=>{
    const ym=k.slice(0,7);
    if(!groups[ym])groups[ym]=[];
    groups[ym].push(k);
  });
  // saved collapsed state per month
  if(!window._sbCollapsed)window._sbCollapsed={};
  // group by year first
  const yearGroups={};
  Object.keys(groups).forEach(ym=>{
    const yr=ym.slice(0,4);
    if(!yearGroups[yr])yearGroups[yr]=[];
    yearGroups[yr].push(ym);
  });
  const currentYM=state.recDate?state.recDate.slice(0,7):'';
  const currentYR=state.recDate?state.recDate.slice(0,4):'';

  Object.keys(yearGroups).sort().reverse().forEach(yr=>{
    // year header
    const yrCollapsed=window._sbCollapsed['yr_'+yr]!==undefined?window._sbCollapsed['yr_'+yr]:(yr!==currentYR);
    const yrHdr=document.createElement('div');
    yrHdr.style.cssText='width:36px;text-align:center;font-size:9px;color:var(--warm-accent);cursor:pointer;padding:5px 0 3px;border-bottom:2px solid var(--warm-accent);margin-bottom:4px;user-select:none;font-weight:700;letter-spacing:.5px';
    const yrContent=document.createElement('div');
    yrContent.style.cssText='display:flex;flex-direction:column;align-items:center;gap:0;margin-bottom:8px';
    yrContent.style.display=yrCollapsed?'none':'flex';
    yrHdr.textContent=yr;
    yrHdr.title=yrCollapsed?'展開'+yr+'年':'收合'+yr+'年';
    yrHdr.onclick=()=>{
      const nowC=yrContent.style.display==='none';
      yrContent.style.display=nowC?'flex':'none';
      window._sbCollapsed['yr_'+yr]=!nowC;
    };
    sb.appendChild(yrHdr);
    sb.appendChild(yrContent);

    yearGroups[yr].sort().reverse().forEach(ym=>{
      const d=new Date(ym+'-01T00:00:00');
      const mLabel=(d.getMonth()+1)+'月';
      const collapsed=ym===currentYM?false:(window._sbCollapsed[ym]!==undefined?window._sbCollapsed[ym]:true);
      const hdr=document.createElement('div');
      hdr.style.cssText='width:36px;text-align:center;font-size:9px;color:var(--warm-accent2);cursor:pointer;padding:3px 0 2px;border-bottom:1px solid var(--warm-border);margin-bottom:2px;user-select:none;font-weight:500';
      hdr.textContent=collapsed?mLabel+'＋':mLabel+'－';
      hdr.title=collapsed?'展開':'收合';
      const groupEl=document.createElement('div');
      groupEl.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:4px';
      groupEl.style.display=collapsed?'none':'flex';
      hdr.onclick=()=>{
        const nowCollapsed=groupEl.style.display==='none';
        groupEl.style.display=nowCollapsed?'flex':'none';
        hdr.textContent=nowCollapsed?mLabel+'－':mLabel+'＋';
        window._sbCollapsed[ym]=!nowCollapsed;
      };
      yrContent.appendChild(hdr);
      yrContent.appendChild(groupEl);
      groups[ym].forEach(k=>{
        const btn=document.createElement('div');
        btn.className='day-btn has-data'+(k===state.recDate?' active':'');
        const dd=new Date(k+'T00:00:00');
        btn.innerHTML=`<span>${dd.getDate()}日</span>`;
        btn.title=k;btn.onclick=()=>loadRecord(k);
        groupEl.appendChild(btn);
      });
    });
  });
}

function showStats(){
  const r=getChildRecords(currentChildId);const keys=Object.keys(r).sort();
  if(!keys.length){showToast('尚無日誌資料');return;}
  const pad=v=>String(v).padStart(2,'0');
  const toDate=keys[keys.length-1];
  const fromD=new Date(toDate+'T00:00:00');fromD.setDate(fromD.getDate()-13);
  const fromDate=`${fromD.getFullYear()}-${pad(fromD.getMonth()+1)}-${pad(fromD.getDate())}`;
  const from=keys.find(k=>k>=fromDate)||keys[0];
  document.getElementById('exp-from').value=from;
  document.getElementById('exp-to').value=toDate;
  document.getElementById('exp-from2').value=keys[0];
  document.getElementById('exp-to2').value=toDate;
  renderStatsContent(r,from,toDate);
  renderExportRecords(r,keys[0],toDate);
  document.getElementById('stats-panel').classList.add('show');
  switchStatsTab('stats');
}
function switchStatsTab(tab){
  document.getElementById('tab-stats').style.display=tab==='stats'?'block':'none';
  document.getElementById('tab-export').style.display=tab==='export'?'block':'none';
  document.getElementById('tab-btn-stats').style.cssText='flex:1;padding:8px;border:none;background:none;font-size:13px;cursor:pointer;'+(tab==='stats'?'color:var(--warm-accent2);font-weight:500;border-bottom:2px solid var(--warm-accent)':'color:var(--warm-muted);border-bottom:2px solid transparent');
  document.getElementById('tab-btn-export').style.cssText='flex:1;padding:8px;border:none;background:none;font-size:13px;cursor:pointer;'+(tab==='export'?'color:var(--warm-accent2);font-weight:500;border-bottom:2px solid var(--warm-accent)':'color:var(--warm-muted);border-bottom:2px solid transparent');
}
function hideStats(){document.getElementById('stats-panel').classList.remove('show')}
function onExportDateChange(){
  const r=getChildRecords(currentChildId);
  const from=document.getElementById('exp-from2').value;
  const to=document.getElementById('exp-to2').value;
  if(from&&to&&from<=to)renderExportRecords(r,from,to);
}
function onStatsDateChange(){
  const r=getChildRecords(currentChildId);
  const from=document.getElementById('exp-from').value;
  const to=document.getElementById('exp-to').value;
  if(from&&to&&from<=to)renderStatsContent(r,from,to);
}
function renderStatsContent(r,from,to){
  const keys=Object.keys(r).filter(k=>k>=from&&k<=to).sort();
  const box=document.getElementById('stats-content');
  if(!keys.length){box.innerHTML='<p style="font-size:12px;color:var(--warm-muted)">此範圍無資料</p>';return;}
  const moodCount={},medCount={},emotionCount={};
  let tFocus=0,nFocus=0,tRemind=0,nRemind=0,tMin=0,nMin=0;
  let nSpecial=0,nTeacher=0,nForgot=0;
  const rows=[];
  keys.forEach(k=>{
    const rec=r[k];
    if(rec.mood)moodCount[rec.mood]=(moodCount[rec.mood]||0)+1;
    (rec.med||[]).forEach(m=>{medCount[m]=(medCount[m]||0)+1;});
    if(rec.special&&rec.special.length>0)nSpecial++;
    if(rec.teacherYes)nTeacher++;
    if(rec.forgotYes)nForgot++;
    (rec.hw||[]).forEach(hw=>{
      if(hw.focus){tFocus+=hw.focus;nFocus++;}
      if(hw.reminders!==''&&hw.reminders!==undefined){tRemind+=Number(hw.reminders);nRemind++;}
      if(hw.doneMin!==''&&hw.doneMin!==undefined){tMin+=Number(hw.doneMin);nMin++;}
      (hw.emotions||[]).forEach(e=>{emotionCount[e]=(emotionCount[e]||0)+1;});
    });
    const spLightsS=(rec.special||[]).map(s=>s.light).filter(Boolean);
    const spLightS=spLightsS.includes('red')?'🔴':spLightsS.includes('yellow')?'🟡':spLightsS.includes('green')?'🟢':'';
    const tLightS=(rec.teacherData&&rec.teacherData.light)||'';
    const feedbackLightS=tLightS==='red'?'🔴':tLightS==='yellow'?'🟡':tLightS==='green'?'🟢':'';
    rows.push({date:k,schoolDay:rec.schoolDay||'-',highlight:(rec.highlight||'-').slice(0,20),spLight:spLightS,feedbackLight:feedbackLightS});
  });
  const n=keys.length;
  const maxMood=Math.max(...Object.values(moodCount),1);
  const maxEmo=Math.max(...Object.values(emotionCount),1);
  const pct=v=>n>0?Math.round(v/n*100):0;
  const childName=(children.find(c=>c.id===currentChildId)||{}).name||'';
  const mc=(label,val,sub)=>'<div style="background:var(--warm-light);border-radius:10px;padding:10px 12px;flex:1;min-width:70px"><div style="font-size:10px;color:var(--warm-muted);margin-bottom:4px">'+label+'</div><div style="font-size:20px;font-weight:500;color:var(--warm-accent);line-height:1">'+val+'</div><div style="font-size:10px;color:var(--warm-muted);margin-top:3px">'+sub+'</div></div>';
  const bar=(label,v,max,countStr)=>'<div class="bar-row"><div class="bar-label" style="min-width:80px">'+label+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(v/max*100)+'%"></div></div><div class="bar-count">'+countStr+'</div></div>';
  // event category counts across special + teacher
  const catCount={};
  keys.forEach(k=>{
    const rec=r[k];
    (rec.special||[]).forEach(s=>(s.categories||[]).forEach(c=>{catCount[c]=(catCount[c]||0)+1;}));
    ((rec.teacherData&&rec.teacherData.categories)||[]).forEach(c=>{catCount[c]=(catCount[c]||0)+1;});
  });
  const maxCat=Math.max(...Object.values(catCount),1);
  const emoHtml=Object.keys(emotionCount).length
    ? Object.entries(emotionCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>bar(k,v,maxEmo,v+'次')).join('')
    : '<p style="font-size:12px;color:var(--warm-muted)">尚無資料</p>';
  // light counts — teacher + special 分開統計
  const tLightCount={red:0,yellow:0,green:0};
  const spLightCount={red:0,yellow:0,green:0};
  keys.forEach(k=>{
    const rec=r[k];
    if(rec.teacherYes&&rec.teacherData&&rec.teacherData.light)tLightCount[rec.teacherData.light]++;
    (rec.special||[]).forEach(s=>{if(s.light)spLightCount[s.light]++;});
  });
  const mkLightBadge=(count,label,bg,color)=>count?'<span style="background:'+bg+';color:'+color+';border-radius:20px;padding:3px 12px;font-size:12px">'+label+' '+count+'次</span>':'';
  const tLightHtml='<div style="font-size:11px;color:var(--warm-muted);margin:6px 0 4px">老師反應燈號</div><div style="display:flex;gap:6px;flex-wrap:wrap">'
    +mkLightBadge(tLightCount.red,'🔴嚴重','#fde8e8','#c44')
    +mkLightBadge(tLightCount.yellow,'🟡有事件','#fef9e0','#996600')
    +mkLightBadge(tLightCount.green,'🟢好事','#e8f8ee','#2a7a44')
    +(!tLightCount.red&&!tLightCount.yellow&&!tLightCount.green?'<span style="font-size:12px;color:var(--warm-muted)">尚無資料</span>':'')
    +'</div>';
  const spLightHtml='<div style="font-size:11px;color:var(--warm-muted);margin:8px 0 4px">特別狀況燈號</div><div style="display:flex;gap:6px;flex-wrap:wrap">'
    +mkLightBadge(spLightCount.red,'🔴嚴重','#fde8e8','#c44')
    +mkLightBadge(spLightCount.yellow,'🟡有事件','#fef9e0','#996600')
    +mkLightBadge(spLightCount.green,'🟢好事','#e8f8ee','#2a7a44')
    +(!spLightCount.red&&!spLightCount.yellow&&!spLightCount.green?'<span style="font-size:12px;color:var(--warm-muted)">尚無資料</span>':'')
    +'</div>';
  const lightHtml=tLightHtml+spLightHtml;
  const catHtml=Object.keys(catCount).length
    ? Object.entries(catCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>bar(k,v,maxCat,v+'次')).join('')
    : '<p style="font-size:12px;color:var(--warm-muted)">尚無資料</p>';
  box.innerHTML=
  '<p style="font-size:12px;color:var(--warm-muted);margin-bottom:12px">孩子：'+childName+'｜共 '+n+' 天</p>'
  +'<div class="stat-card"><h3>重點事件頻率</h3>'
  +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'
  +mc('特別狀況',nSpecial+'次',n+'天中'+pct(nSpecial)+'%')
  +mc('老師反應',nTeacher+'次',n+'天中'+pct(nTeacher)+'%')
  +mc('忘記帶東西',nForgot+'次',n+'天中'+pct(nForgot)+'%')
  +'</div>'
  +lightHtml
  +'<div style="font-size:11px;color:var(--warm-muted);margin-bottom:6px">事件分類次數</div>'
  +catHtml+'</div>'
  +'<div class="stat-card"><h3>情緒行為出現次數</h3>'+emoHtml+'</div>'
  +'<div class="stat-card"><h3>保健食品使用次數</h3>'
  +( Object.entries(medCount).map(([k,v])=>bar(k,v,n||1,v+'次')).join('') || '<p style="font-size:12px;color:var(--warm-muted)">無資料</p>' )
  +'</div>'
  +'<div class="stat-card"><h3>作業概況平均</h3><div style="display:flex;gap:8px;flex-wrap:wrap">'
  +mc('平均專注度', nFocus?Math.round(tFocus/nFocus*10)/10+'★':'-', '')
  +mc('平均提醒', nRemind?Math.round(tRemind/nRemind*10)/10+'次':'-', '')
  +mc('平均作業', nMin?Math.round(tMin/nMin)+'分':'-', '')
  +'</div></div>';
}
function renderExportRecords(r,from,to){
  const allKeys=Object.keys(r).sort();
  const box=document.getElementById('export-records');
  if(!box)return;
  if(!allKeys.length){box.innerHTML='<p style="font-size:12px;color:var(--warm-muted)">此範圍無資料</p>';return;}
  // always show last 14 days
  const last14=allKeys.slice(-14);
  const rows=last14.map(k=>{
    const rec=r[k];
    // 狀況 = special 燈號
    const spLights=(rec.special||[]).map(s=>s.light).filter(Boolean);
    const spLight=spLights.includes('red')?'🔴':spLights.includes('yellow')?'🟡':spLights.includes('green')?'🟢':'';
    // 回饋 = teacher 燈號
    const tLight=(rec.teacherData&&rec.teacherData.light)||'';
    const feedbackLight=tLight==='red'?'🔴':tLight==='yellow'?'🟡':tLight==='green'?'🟢':'';
    return {date:k,schoolDay:rec.schoolDay||'-',highlight:(rec.highlight||'-').slice(0,20),hasSpecial:rec.special&&rec.special.length>0,spLight,feedbackLight};
  });
  box.innerHTML='<div class="stat-card"><h3>每日記錄總覽 <span style="font-size:10px;color:var(--warm-muted);font-weight:400">最近兩週</span></h3>'
  +'<div style="overflow-x:auto"><table class="stat-table">'
  +'<tr><th>日期</th><th>上學</th><th>反應</th><th>狀況</th><th>亮點</th></tr>'
  +[...rows].reverse().map(row=>'<tr><td>'+row.date+'</td><td>'+row.schoolDay+'</td><td style="text-align:center">'+row.feedbackLight+'</td><td style="text-align:center">'+row.spLight+'</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+row.highlight+'</td></tr>').join('')
  +'</table></div></div>';
}

function exportCSV(){
  const r=getChildRecords(currentChildId);
  const from=document.getElementById('exp-from2').value;const to=document.getElementById('exp-to2').value;
  const keys=Object.keys(r).filter(k=>k>=from&&k<=to).sort();
  if(!keys.length){showToast('此範圍無資料');return;}
  const childName=(children.find(c=>c.id===currentChildId)||{}).name||'';
  const rows=[['孩子','日期','時間','保健食品','藥物','上學','心情','忘記帶東西','老師反應','老師反應燈號','老師反應分類','老師說法','孩子說法','家長處理','特別狀況數','特別狀況燈號','特別狀況分類','特別狀況描述','今日亮點','今後策略']];
  keys.forEach(k=>{
    const rec=r[k];
    const td=rec.teacherData||{};
    const tLightMap={red:'🔴嚴重',yellow:'🟡有事件',green:'🟢好事'};
    const tLight=tLightMap[td.light]||'';
    const tCats=(td.categories||[]).join('；');
    const specials=rec.special||[];
    const spCount=specials.length;
    const spLights=specials.map(s=>tLightMap[s.light]||'').filter(Boolean).join('；');
    const spCats=[...new Set(specials.flatMap(s=>s.categories||[]))].join('；');
    const spDesc=specials.map((s,i)=>{
      const parts=[];
      if(s.time)parts.push('時間:'+s.time);
      if(s.place)parts.push('地點:'+s.place);
      if(s.target)parts.push('對象:'+s.target);
      if(s.event)parts.push('事件:'+s.event);
      if(s.handle)parts.push('處理:'+s.handle);
      return parts.length?'【'+(i+1)+'】'+parts.join('、'):'';
    }).filter(Boolean).join(' / ');
    rows.push([childName,rec.recDate||k,rec.recTime||'',(rec.med||[]).join('；'),(rec.drug||[]).join('；'),rec.schoolDay||'',rec.mood||'',rec.forgotYes?`有：${rec.forgotWhat}`:'否',rec.teacherYes?'有':'否',tLight,tCats,td.teacherSay||'',td.childSay||'',td.parentHandle||'',spCount,spLights,spCats,spDesc,rec.highlight||'',rec.strategy||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download=`ndlog_${childName}_${from}_${to}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('CSV匯出完成！');
}
function exportJSON(){
  const pad=v=>String(v).padStart(2,'0');const now=new Date();
  const dateStr=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const backup={version:'1.6',date:dateStr,children,records:getAllRecords(),gOpts};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download=`ndlog_backup_${dateStr}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('備份完成！');
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.children||!data.records){showToast('檔案格式不正確');return;}
      if(!confirm('還原後將覆蓋目前所有資料，確定嗎？'))return;
      localStorage.setItem(CHILDREN_KEY,JSON.stringify(data.children));
      localStorage.setItem(STORE_KEY,JSON.stringify(data.records));
      if(data.gOpts)localStorage.setItem(GOPTS_KEY,JSON.stringify(data.gOpts));
      showToast('還原成功！重新載入中...');
      setTimeout(()=>location.reload(),1200);
    }catch(err){showToast('還原失敗，檔案可能損毀');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function onDateChange(){
  const newDate=document.getElementById('rec-date').value;
  if(!newDate)return;
  // save current state first if highlight filled
  if(state.highlight&&state.highlight.trim()&&state.recDate&&state.recDate!==newDate){
    gatherState();
    setChildRecord(currentChildId,state.recDate,JSON.parse(JSON.stringify(state)));
  }
  // load or reset for new date
  const r=getChildRecords(currentChildId);
  if(r[newDate]){
    Object.assign(state,JSON.parse(JSON.stringify(r[newDate])));
    state.recDate=newDate;
    document.getElementById('rec-date').value=newDate;
    document.getElementById('rec-time').value=state.recTime||'';
    renderAll();
    renderSidebar();
    showToast('已載入 '+newDate+' 的紀錄');
  } else {
    resetState();
    state.recDate=newDate;
    document.getElementById('rec-date').value=newDate;
    const now=new Date();const pad=v=>String(v).padStart(2,'0');
    document.getElementById('rec-time').value=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    renderAll();
    addHW();
    showToast('已切換到 '+newDate+'（新紀錄）');
  }
}
function init(){
  const now=new Date();const pad=n=>String(n).padStart(2,'0');
  const today=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('rec-date').value=today;
  document.getElementById('rec-time').value=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  state.recDate=today;
  renderChildTabs();
  // 只有今天已有紀錄才載入，否則永遠開新頁
  const r=getChildRecords(currentChildId);
  if(r[today]){loadRecord(today);}else{resetState();state.recDate=today;renderAll();addHW();}
}

// 每分鐘檢查是否跨日，若跨日自動切換到新的一頁
let _lastDate=(()=>{const n=new Date();const p=v=>String(v).padStart(2,'0');return`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}`;})();
setInterval(()=>{
  const now=new Date();const pad=v=>String(v).padStart(2,'0');
  const today=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  if(today!==_lastDate){
    _lastDate=today;
    document.getElementById('rec-date').value=today;
    document.getElementById('rec-time').value=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    resetState();state.recDate=today;
    renderAll();addHW();
    showToast('新的一天開始了！');
  }
},60000);

init();
